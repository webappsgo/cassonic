stages:
  - build
  - test
  - security
  - release

variables:
  CGO_ENABLED: "0"

.go-base:
  image: $CI_REGISTRY_IMAGE:build

build:
  stage: build
  extends: .go-base
  script:
    - |
      if [ -f release.txt ]; then VERSION=$(cat release.txt); else VERSION="${CI_COMMIT_REF_NAME#v}"; fi
      COMMIT_ID=$(git rev-parse --short HEAD)
      BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
      LDFLAGS="-s -w -X 'main.Version=$VERSION' -X 'main.CommitID=$COMMIT_ID' -X 'main.BuildDate=$BUILD_DATE'"
      go build -ldflags "$LDFLAGS" -o /dev/null ./src
      go build -ldflags "$LDFLAGS" -o /dev/null ./src/client

lint:
  stage: test
  extends: .go-base
  script:
    - go vet ./...
    - staticcheck ./...

test:
  stage: test
  extends: .go-base
  script:
    - go test -cover -coverprofile=coverage.out ./...
    - |
      THRESHOLD=60
      PCT=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%","",$3); print int($3)}')
      if [ "$PCT" -lt "$THRESHOLD" ]; then
        echo "Coverage $PCT% < threshold $THRESHOLD%"
        exit 1
      fi

secret-scan:
  stage: security
  image: alpine:latest
  before_script:
    - apk add --no-cache git curl
    - curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin
  script:
    - trufflehog git file://. --since-commit $CI_COMMIT_BEFORE_SHA --only-verified

vuln-scan:
  stage: security
  extends: .go-base
  script:
    - |
      if [ -f go.sum ]; then
        govulncheck ./...
      else
        echo "No go.sum found, skipping vuln scan"
      fi

release:
  stage: release
  extends: .go-base
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - |
      if [ -f release.txt ]; then VERSION=$(cat release.txt); else VERSION="${CI_COMMIT_TAG#v}"; fi
      COMMIT_ID=$(git rev-parse --short HEAD)
      BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
      LDFLAGS="-s -w -X 'main.Version=$VERSION' -X 'main.CommitID=$COMMIT_ID' -X 'main.BuildDate=$BUILD_DATE'"
      mkdir -p binaries
      for platform in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64 freebsd/amd64 freebsd/arm64; do
        OS=${platform%/*}
        ARCH=${platform#*/}
        OUTPUT="binaries/${CI_PROJECT_NAME}-${OS}-${ARCH}"
        [ "$OS" = "windows" ] && OUTPUT="${OUTPUT}.exe"
        GOOS=$OS GOARCH=$ARCH go build -ldflags "$LDFLAGS" -o "$OUTPUT" ./src
        OUTPUT_CLI="binaries/${CI_PROJECT_NAME}-cli-${OS}-${ARCH}"
        [ "$OS" = "windows" ] && OUTPUT_CLI="${OUTPUT_CLI}.exe"
        GOOS=$OS GOARCH=$ARCH go build -ldflags "$LDFLAGS" -o "$OUTPUT_CLI" ./src/client
      done
      cd binaries && sha256sum * > SHA256SUMS.txt
