{{template "base" .}}

{{define "content"}}
<div class="page-header">
  <h1 class="page-title">{{call .T "player.now_playing"}}</h1>
  <a href="/" class="btn btn-ghost btn-icon btn-sm" aria-label="{{call .T "player.collapse"}}">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16" aria-hidden="true"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/></svg>
  </a>
</div>

<div class="player-full">
  <div class="player-full-left">
    <div class="now-playing-art" id="full-art" aria-hidden="true">
      <div class="album-art-placeholder" id="full-art-placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="12" cy="12" r="3"/>
          <circle cx="12" cy="12" r="1" fill="currentColor"/>
        </svg>
      </div>
      <img id="full-art-img" src="" alt="" hidden>
    </div>

    <div class="now-playing-info">
      <h2 class="now-playing-title" id="full-title">{{call .T "player.nothing_playing"}}</h2>
      <p class="now-playing-artist" id="full-artist"></p>
      <p class="now-playing-album" id="full-album"></p>
    </div>

    <section id="lyrics-panel" hidden aria-live="polite" aria-label="{{call .T "player.lyrics"}}">
      <h3 class="section-title">{{call .T "player.lyrics"}}</h3>
      <div class="lyrics-content" id="lyrics-content"></div>
    </section>
  </div>

  <div class="player-full-right">
    <section aria-label="{{call .T "player.queue"}}">
      <h3 class="section-title">{{call .T "player.queue"}}</h3>
      <ol class="queue-list" id="queue-list" aria-label="{{call .T "player.queue"}}">
        <li class="queue-empty" id="queue-empty" aria-live="polite">
          <span class="empty-state-text">{{call .T "player.queue.empty"}}</span>
        </li>
      </ol>
    </section>
  </div>
</div>
{{end}}
