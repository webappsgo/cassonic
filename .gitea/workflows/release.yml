name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - '*.*.*'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ensure-build-image:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    outputs:
      image: ${{ steps.pull.outputs.image }}
    steps:
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: pull
        name: Pull build image (fail fast if missing)
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:build"
          if ! docker pull "$IMAGE"; then
            echo "::error::Build image $IMAGE not found."
            exit 1
          fi
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

  build:
    needs: ensure-build-image
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.ensure-build-image.outputs.image }}
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Set build info
        run: |
          if [ -f release.txt ]; then echo "VERSION=$(cat release.txt)" >> $GITHUB_ENV; else echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV; fi
          echo "COMMIT_ID=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_ENV

      - name: Build all platforms
        run: |
          mkdir -p binaries
          LDFLAGS="-s -w -X 'main.Version=${{ env.VERSION }}' -X 'main.CommitID=${{ env.COMMIT_ID }}' -X 'main.BuildDate=${{ env.BUILD_DATE }}'"
          for platform in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64 freebsd/amd64 freebsd/arm64; do
            OS=${platform%/*}
            ARCH=${platform#*/}
            OUTPUT="binaries/${{ github.event.repository.name }}-${OS}-${ARCH}"
            [ "$OS" = "windows" ] && OUTPUT="${OUTPUT}.exe"
            echo "Building ${OS}/${ARCH}..."
            GOOS=$OS GOARCH=$ARCH go build -ldflags "$LDFLAGS" -o "$OUTPUT" ./src
            OUTPUT_CLI="binaries/${{ github.event.repository.name }}-cli-${OS}-${ARCH}"
            [ "$OS" = "windows" ] && OUTPUT_CLI="${OUTPUT_CLI}.exe"
            GOOS=$OS GOARCH=$ARCH go build -ldflags "$LDFLAGS" -o "$OUTPUT_CLI" ./src/client
          done

      - name: Generate checksums
        run: |
          cd binaries
          sha256sum * > SHA256SUMS.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: binaries/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: binaries/

      - name: Ensure release tag
        run: |
          ref="${{ github.ref }}"
          if [[ "$ref" != refs/tags/* ]]; then
            echo "::error::release.yml triggered on non-tag ref '$ref'."
            exit 1
          fi
          tag="${ref#refs/tags/}"
          git tag -d "$tag" 2>/dev/null || true
          git push origin ":refs/tags/$tag" 2>/dev/null || true
          git tag "$tag"
          git push origin "refs/tags/$tag"
          echo "Tag '$tag' ensured at $(git rev-parse HEAD)"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release create "$TAG" binaries/* \
            --title "${{ github.event.repository.name }} ${TAG}" \
            --notes "Release ${TAG}" \
            --latest
