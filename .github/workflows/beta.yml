name: Beta

on:
  push:
    branches: [beta]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ensure-build-image:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    outputs:
      image: ${{ steps.pull.outputs.image }}
    steps:
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: pull
        name: Pull build image
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:build"
          if ! docker pull "$IMAGE"; then
            echo "::error::Build image $IMAGE not found. Trigger build-toolchain.yml first."
            exit 1
          fi
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

  build:
    needs: ensure-build-image
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.ensure-build-image.outputs.image }}
    permissions:
      contents: write
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set build info
        run: |
          TIMESTAMP=$(date -u +"%Y%m%d%H%M%S")
          echo "VERSION=${TIMESTAMP}-beta" >> $GITHUB_ENV
          echo "COMMIT_ID=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_ENV

      - name: Build all platforms
        run: |
          mkdir -p binaries
          LDFLAGS="-s -w -X 'main.Version=${{ env.VERSION }}' -X 'main.CommitID=${{ env.COMMIT_ID }}' -X 'main.BuildDate=${{ env.BUILD_DATE }}'"
          for platform in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64 freebsd/amd64 freebsd/arm64; do
            OS=${platform%/*}
            ARCH=${platform#*/}
            OUTPUT="binaries/${{ github.event.repository.name }}-${OS}-${ARCH}"
            [ "$OS" = "windows" ] && OUTPUT="${OUTPUT}.exe"
            GOOS=$OS GOARCH=$ARCH go build -ldflags "$LDFLAGS" -o "$OUTPUT" ./src
            OUTPUT_CLI="binaries/${{ github.event.repository.name }}-cli-${OS}-${ARCH}"
            [ "$OS" = "windows" ] && OUTPUT_CLI="${OUTPUT_CLI}.exe"
            GOOS=$OS GOARCH=$ARCH go build -ldflags "$LDFLAGS" -o "$OUTPUT_CLI" ./src/client
          done
          cd binaries && sha256sum * > SHA256SUMS.txt

      - name: Create beta release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ env.VERSION }}"
          gh release delete "$TAG" --yes 2>/dev/null || true
          git tag -d "$TAG" 2>/dev/null || true
          git tag "$TAG"
          git push origin "refs/tags/$TAG"
          gh release create "$TAG" binaries/* \
            --title "${{ github.event.repository.name }} ${TAG}" \
            --notes "Beta build ${TAG}" \
            --prerelease
