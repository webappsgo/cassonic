name: Daily Build

on:
  schedule:
    - cron: '0 3 * * *'
  push:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ensure-build-image:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    outputs:
      image: ${{ steps.pull.outputs.image }}
    steps:
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: pull
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:build"
          if ! docker pull "$IMAGE"; then
            echo "::error::Build image $IMAGE not found. Trigger build-toolchain.yml first."
            exit 1
          fi
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

  build:
    needs: ensure-build-image
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.ensure-build-image.outputs.image }}
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Set build info
        run: |
          TIMESTAMP=$(date -u +"%Y%m%d%H%M%S")
          echo "VERSION=${TIMESTAMP}" >> $GITHUB_ENV
          echo "COMMIT_ID=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_ENV
      - name: Build
        run: |
          LDFLAGS="-s -w -X 'main.Version=${{ env.VERSION }}' -X 'main.CommitID=${{ env.COMMIT_ID }}' -X 'main.BuildDate=${{ env.BUILD_DATE }}'"
          go build -ldflags "$LDFLAGS" -o /dev/null ./src
          go build -ldflags "$LDFLAGS" -o /dev/null ./src/client
